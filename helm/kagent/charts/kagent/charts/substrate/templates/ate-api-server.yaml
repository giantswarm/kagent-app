apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "substrate.fullname" (list "ate-api-server-role" .) }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["ate.dev"]
  resources: ["actortemplates"]
  verbs: ["get", "watch", "list"]
# Secret reads for env source resolution are intentionally NOT granted
# cluster-wide here. Each demo / tenant is responsible for granting
# ate-api-server read access only to the specific Secrets referenced by its
# ActorTemplates (e.g. via a namespace-scoped Role + RoleBinding using
# resourceNames).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "substrate.fullname" (list "ate-api-server" .) }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "substrate.fullname" (list "ate-api-server-binding" .) }}
subjects:
- kind: ServiceAccount
  name: {{ include "substrate.fullname" (list "ate-api-server" .) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "substrate.fullname" (list "ate-api-server-role" .) }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "substrate.fullname" (list "ate-api-server-deployment" .) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ate-api-server
  template:
    metadata:
      labels:
        app: ate-api-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: {{ include "substrate.fullname" (list "ate-api-server" .) }}
{{- if eq .Values.auth.mode "jwt" }}
      initContainers:
      - name: assemble-cred-bundle
        image: {{ .Values.images.busybox }}
        command:
        - sh
        - -c
        - cat /run/ateapi-tls-src/tls.crt /run/ateapi-tls-src/tls.key > /run/ateapi-tls/credential-bundle.pem
        volumeMounts:
        - { name: ateapi-tls-src, mountPath: /run/ateapi-tls-src, readOnly: true }
        - { name: ateapi-tls,     mountPath: /run/ateapi-tls }
{{- end }}
      containers:
      - name: ate-api-server
        image: {{ include "substrate.componentImage" (list "ateapi" .) }}
        args:
        - "--grpc-listen-addr=0.0.0.0:443"
{{- if eq .Values.auth.mode "mtls" }}
        - "--grpc-server-cred-bundle=/run/servicedns.podcert.ate.dev/credential-bundle.pem"
        - "--redis-cluster-address=@env"
        - "--redis-ca-certs=/etc/valkey-ca/ca.crt"
        - "--redis-use-iam-auth=@env"
        - "--redis-tls-server-name=@env"
        - "--redis-client-cert=@env"
        - "--client-jwt-issuer=@env"
        - "--client-jwt-audience={{ .Values.auth.jwt.audience }}"
        - "--session-id-jwt-pool=/run/session-id-jwt-pool/pool.json"
        - "--session-id-ca-pool=/run/session-id-ca-pool/pool.json"
        - "--workerpool-ca-certs=/run/workerpool-ca-certs/trust-bundle.pem"
{{- else }}
        - "--grpc-server-cred-bundle=/run/ateapi-tls/credential-bundle.pem"
        - "--auth-mode=jwt"
        - "--redis-cluster-address=@env"
        - "--redis-no-tls=true"
        - "--redis-use-iam-auth=@env"
        - "--client-jwt-issuer={{ .Values.auth.jwt.issuer }}"
        - "--client-jwt-audience={{ .Values.auth.jwt.audience }}"
        - "--session-id-jwt-pool=/run/session-id-jwt-pool/pool.json"
        - "--session-id-ca-pool=/run/session-id-ca-pool/pool.json"
        - "--client-jwt-ca-cert=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
{{- end }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.pod.uid=$(POD_UID),service.instance.id=$(POD_UID)
{{- if .Values.otel.endpoint }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.otel.endpoint | quote }}
{{- end }}
        envFrom:
        - configMapRef:
            name: {{ .Values.ateApiServerEnvVarsConfigMap }}
            optional: true
        volumeMounts:
{{- if eq .Values.auth.mode "mtls" }}
        - { name: servicedns,          mountPath: /run/servicedns.podcert.ate.dev }
        - { name: session-id-jwt-pool, mountPath: /run/session-id-jwt-pool }
        - { name: valkey-ca-certs,     mountPath: /etc/valkey-ca, readOnly: true }
        - { name: session-id-ca-pool,  mountPath: /run/session-id-ca-pool, readOnly: true }
        - { name: workerpool-ca-certs, mountPath: /run/workerpool-ca-certs, readOnly: true }
{{- else }}
        - { name: ateapi-tls,          mountPath: /run/ateapi-tls, readOnly: true }
        - { name: session-id-jwt-pool, mountPath: /run/session-id-jwt-pool }
        - { name: session-id-ca-pool,  mountPath: /run/session-id-ca-pool, readOnly: true }
{{- end }}
        ports:
        - containerPort: 443
        - name: prometheus
          containerPort: 9090
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 2
      volumes:
{{- if eq .Values.auth.mode "mtls" }}
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: session-id-jwt-pool
        projected:
          sources:
          - secret:
              name: session-id-jwt-pool
              items:
              - { key: pool, path: pool.json }
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - { key: ca.crt, path: ca.crt }
      - name: session-id-ca-pool
        projected:
          sources:
          - secret:
              name: session-id-ca-pool
              items:
              - { key: pool, path: pool.json }
      - name: workerpool-ca-certs
        projected:
          sources:
          - clusterTrustBundle:
              signerName: podidentity.podcert.ate.dev/identity
              labelSelector:
                matchLabels:
                  podcert.ate.dev/canarying: live
              path: trust-bundle.pem
{{- else }}
      - name: ateapi-tls-src
        secret:
          secretName: {{ .Values.auth.jwt.serverCertSecret }}
      - name: ateapi-tls
        emptyDir: {}
      - name: session-id-jwt-pool
        projected:
          sources:
          - secret:
              name: session-id-jwt-pool
              items:
              - { key: pool, path: pool.json }
      - name: session-id-ca-pool
        projected:
          sources:
          - secret:
              name: session-id-ca-pool
              items:
              - { key: pool, path: pool.json }
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "substrate.fullname" (list "api" .) }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: ate-api-server
  ports:
  - name: grpc
    protocol: TCP
    port: 443
    targetPort: 443
