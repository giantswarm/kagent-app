{{- if .Values.valkey.enabled -}}
{{- $sts := include "substrate.fullname" (list "valkey-cluster" .) -}}
{{- $headless := include "substrate.fullname" (list "valkey-cluster-service" .) -}}
{{- $ns := .Release.Namespace -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "substrate.fullname" (list "valkey-config" .) }}
  namespace: {{ .Release.Namespace }}
data:
  valkey.conf: |
{{- if eq .Values.auth.mode "mtls" }}
    # Enforce TLS and disable standard port
    port 0
    tls-port 6379
    tls-cluster yes
    tls-replication yes

    # Load certificates from projected volume
    tls-cert-file /run/servicedns.podcert.ate.dev/credential-bundle.pem
    tls-key-file /run/servicedns.podcert.ate.dev/credential-bundle.pem
    tls-ca-cert-file /etc/valkey-ca/ca.crt
    tls-auth-clients yes

    # Enable cluster mode
{{- else }}
    # Plaintext: serve on the standard port, no TLS.
    port 6379

{{- end }}
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    appendonly yes
    protected-mode no
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $headless }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: valkey-cluster
  ports:
  - name: valkey
    port: 6379
    targetPort: 6379
  - name: bus
    port: 16379
    targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $sts }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: valkey-cluster
  ports:
  - name: valkey
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $sts }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ $headless }}
  replicas: {{ .Values.valkey.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: valkey-cluster
  template:
    metadata:
      labels:
        app: valkey-cluster
    spec:
      containers:
      - name: valkey
        image: {{ .Values.images.valkey }}
        command: ["valkey-server", "/etc/valkey/valkey.conf"]
        ports:
        - name: valkey
          containerPort: 6379
        - name: bus
          containerPort: 16379
        volumeMounts:
        - name: config
          mountPath: /etc/valkey
{{- if eq .Values.auth.mode "mtls" }}
        - name: servicedns
          mountPath: /run/servicedns.podcert.ate.dev
        - name: valkey-ca-certs
          mountPath: /etc/valkey-ca
          readOnly: true
{{- end }}
        - name: data
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: {{ include "substrate.fullname" (list "valkey-config" .) }}
{{- if eq .Values.auth.mode "mtls" }}
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - key: ca.crt
                path: ca.crt
{{- end }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.valkey.storageSize }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "substrate.fullname" (list "valkey-cluster-init" .) }}
  namespace: {{ .Release.Namespace }}
spec:
  template:
    metadata:
      labels:
        app: valkey-cluster-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init
        image: {{ .Values.images.valkey }}
{{- if eq .Values.auth.mode "mtls" }}
        volumeMounts:
        - name: servicedns
          mountPath: /run/servicedns.podcert.ate.dev
        - name: valkey-ca-certs
          mountPath: /etc/valkey-ca
          readOnly: true
{{- end }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for all Valkey pods to resolve..."
          for i in 0 1 2 3 4 5; do
            until getent hosts {{ $sts }}-${i}.{{ $headless }}.{{ $ns }}.svc >/dev/null 2>&1; do
              echo "Waiting for {{ $sts }}-${i} DNS..."
              sleep 2
            done
          done

          echo "All pods resolved. Getting IPs..."
          POD_IPS=""
          for i in 0 1 2 3 4 5; do
            ip=$(getent hosts {{ $sts }}-${i}.{{ $headless }}.{{ $ns }}.svc | awk '{print $1}')
            POD_IPS="${POD_IPS} ${ip}:6379"
          done

          echo "Checking if Valkey cluster is already initialized..."
{{- if eq .Values.auth.mode "mtls" }}
          until valkey-cli --tls --cacert /etc/valkey-ca/ca.crt --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem --key /run/servicedns.podcert.ate.dev/credential-bundle.pem -h {{ $sts }}-0.{{ $headless }}.{{ $ns }}.svc ping >/dev/null 2>&1; do
            echo "Waiting for {{ $sts }}-0 to respond to ping..."
            sleep 2
          done

          INIT_STATUS=$(valkey-cli --tls --cacert /etc/valkey-ca/ca.crt --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem --key /run/servicedns.podcert.ate.dev/credential-bundle.pem -h {{ $sts }}-0.{{ $headless }}.{{ $ns }}.svc cluster info 2>/dev/null | grep cluster_state || true)

          if [ -z "${INIT_STATUS}" ] || ! echo "${INIT_STATUS}" | grep -q "cluster_state:ok"; then
            echo "Initializing Valkey cluster..."
            valkey-cli --tls \
              --cacert /etc/valkey-ca/ca.crt \
              --cert /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --key /run/servicedns.podcert.ate.dev/credential-bundle.pem \
              --cluster create ${POD_IPS} \
              --cluster-replicas 1 \
              --cluster-yes
            echo "Cluster initialization complete!"
          else
            echo "Cluster already initialized."
          fi
{{- else }}
          until valkey-cli -h {{ $sts }}-0.{{ $headless }}.{{ $ns }}.svc -p 6379 ping >/dev/null 2>&1; do
            echo "Waiting for {{ $sts }}-0 to respond to ping..."
            sleep 2
          done

          INIT_STATUS=$(valkey-cli -h {{ $sts }}-0.{{ $headless }}.{{ $ns }}.svc -p 6379 cluster info 2>/dev/null | grep cluster_state || true)

          if [ -z "${INIT_STATUS}" ] || ! echo "${INIT_STATUS}" | grep -q "cluster_state:ok"; then
            echo "Initializing Valkey cluster..."
            valkey-cli \
              --cluster create ${POD_IPS} \
              --cluster-replicas 1 \
              --cluster-yes
            echo "Cluster initialization complete!"
          else
            echo "Cluster already initialized."
          fi
{{- end }}
{{- if eq .Values.auth.mode "mtls" }}
      volumes:
      - name: servicedns
        projected:
          sources:
          - podCertificate:
              signerName: servicedns.podcert.ate.dev/identity
              keyType: ECDSAP256
              credentialBundlePath: credential-bundle.pem
      - name: valkey-ca-certs
        projected:
          sources:
          - secret:
              name: valkey-ca-certs
              items:
              - key: ca.crt
                path: ca.crt
{{- end }}
{{- end }}
