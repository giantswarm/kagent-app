# atenet-dns — identical across auth modes (does not dial ateapi).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: kube-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "substrate.fullname" (list "atenet-dns" .) }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "substrate.fullname" (list "dns" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns
  template:
    metadata:
      labels:
        app: dns
    spec:
      serviceAccountName: {{ include "substrate.fullname" (list "atenet-dns" .) }}
      shareProcessNamespace: true
      initContainers:
      - name: init-dns
        image: {{ .Values.images.busybox }}
        command: ["sh", "-c"]
        args:
        - |
          cat <<'EOF' > /etc/coredns/Corefile
          .:53 {
              errors
              health :8080
              ready :8181
              reload
          }
          EOF
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
      containers:
      - name: coredns
        image: {{ .Values.images.coredns }}
        imagePullPolicy: IfNotPresent
        args: [ "-conf", "/etc/coredns/Corefile" ]
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
        ports:
        - name: dns
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8181
            scheme: HTTP
          initialDelaySeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
      - name: dns-controller
        image: {{ include "substrate.componentImage" (list "atenet" .) }}
        args:
        - "dns"
        - "--log-level=debug"
        - "--interval=10s"
        - "--corefile-path=/etc/coredns/Corefile"
        volumeMounts:
        - name: dns-config-volume
          mountPath: /etc/coredns
      volumes:
        - name: dns-config-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "substrate.fullname" (list "dns" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: dns
spec:
  selector:
    app: dns
  type: ClusterIP
  ports:
  - name: dns
    port: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    protocol: TCP
