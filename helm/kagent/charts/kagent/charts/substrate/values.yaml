# Default values for the substrate chart.
#
# The chart supports two installation modes via `auth.mode`:
#
#   - "jwt" (default): No PodCertificateRequest / ClusterTrustBundle usage. Server
#     certs and session signing pools are generated by the chart by default,
#     and can be disabled when you want to provide your own key material.
#     Clients authenticate to ateapi with a projected Kubernetes ServiceAccount
#     token. Valkey runs plaintext.
#
#   - "mtls": Server certs are issued by the in-cluster podcertcontroller via
#     PodCertificateRequest + projected into pods via the ClusterTrustBundle /
#     podCertificate projection sources. Valkey runs with full TLS +
#     client-cert verification. REQUIRES the off-by-default Kubernetes feature
#     gates:
#       ClusterTrustBundle, ClusterTrustBundleProjection, PodCertificateRequest
#     and the v1beta1 certificates API.

auth:
  mode: jwt   # jwt | mtls

  jwt:
    # OIDC issuer URL the cluster uses to mint SA tokens. The default matches
    # stock kind/kubeadm-style clusters. Override this for managed clusters
    # whose service account issuer is provider-specific. Examples:
    #   GKE:   https://container.googleapis.com/v1/projects/<proj>/locations/<loc>/clusters/<name>
    #   kind:  https://kubernetes.default.svc.cluster.local
    #   EKS:   https://oidc.eks.<region>.amazonaws.com/id/<id>
    issuer: https://kubernetes.default.svc.cluster.local

    # Audience SA tokens are minted for, and that ateapi expects.
    audience: api.ate-system.svc

    bootstrap:
      # Generate JWT-mode TLS and session-signing key material with Helm.
      # Existing generated resources are reused on upgrade via lookup.
      enabled: true
      serverCert:
        enabled: true
      sessionPools:
        enabled: true

    # Name of a kubernetes.io/tls Secret in the release namespace, with keys
    # tls.crt and tls.key. Created by the chart when
    # auth.jwt.bootstrap.serverCert.enabled=true.
    serverCertSecret: ateapi-tls

    # Name of a ConfigMap in the release namespace with key "ca.crt" holding
    # the CA(s) that signed serverCertSecret. Clients mount it to verify the
    # ateapi server certificate. Created by the chart when
    # auth.jwt.bootstrap.serverCert.enabled=true.
    caBundleConfigMap: ateapi-ca

# Set to true to have the chart create the release namespace.
# Off by default — most helm workflows expect the namespace to already exist
# (helm install -n <ns> --create-namespace). Enable for the generated
# manifests/ate-install/ install path (kubectl apply).
createNamespace: false

valkey:
  enabled: true
  replicas: 6
  storageSize: 1Gi

rustfs:
  enabled: true
  storageSize: 1Gi
  bucket: ate-snapshots
  accessKey: rustfsadmin
  secretKey: rustfsadmin

# atelet daemonset overrides. Defaults use the in-cluster RustFS deployment for
# snapshots. Set rustfs.enabled=false and override these fields when using
# external storage.
# extraArgs / extraEnv are appended verbatim for installer-specific knobs
# (e.g. registry replacement for kind).
atelet:
  gcpAuthForImagePulls: false
  storageBackend: s3
  extraArgs: []
  extraEnv: []

redis:
  # Override the cluster address. Empty -> derived from valkey.enabled
  # (defaults to "valkey-cluster.ate-system.svc:6379").
  clusterAddress: ""
  # Google IAM auth (for managed Memorystore / cloud Valkey).
  useIAMAuth: false
  # Override TLS server name for Redis hostname verification (mtls mode).
  tlsServerName: ""
  # File path for Redis client TLS credential bundle (mtls mode).
  clientCert: ""

# Name of a ConfigMap in the release namespace that supplies per-environment
# overrides for ate-api-server (ATE_API_REDIS_*, ATE_API_K8SJWT_ISSUER, ...).
# Mounted via envFrom with optional=true. Created by the chart from these values.
ateApiServerEnvVarsConfigMap: ate-api-server-envvars

otel:
  endpoint: ""

image:
  registry: ghcr.io/kagent-dev/substrate
  tag: ""

images:
  valkey: valkey/valkey:8.0
  rustfs: rustfs/rustfs:1.0.0-beta.3@sha256:378642b05b7dcb4849fb77ebe6aca4ced1c3f66e7e504247df95a5c9018d3358
  awsCli: amazon/aws-cli:2.17.0@sha256:643507c10ada7964ca6157b3d799f030b90577643da9955d319a77399ed80d73
  agentgateway: cr.agentgateway.dev/agentgateway:v1.3.0-alpha.1
  coredns: coredns/coredns:1.11.1
  busybox: busybox:1.36
